  {id:'family', field:'family', label:'Families'},
  {id:'model', field:'model', label:'Models'},
  {id:'frameType', field:'frameType', label:'Frame Types'},

  grid: document.getElementById('grid'), countPill: document.getElementById('countPill'), pricingPill: document.getElementById('pricingPill'), dataSourcePill: document.getElementById('dataSourcePill'), resultSummary: document.getElementById('resultSummary'), viewSummary: document.getElementById('viewSummary'),
  pageSize: document.getElementById('pageSize'), sortBy: document.getElementById('sortBy'), groupByModel: document.getElementById('groupByModel'), pageInfo: document.getElementById('pageInfo'), prevPage: document.getElementById('prevPage'), nextPage: document.getElementById('nextPage'),

function setDataStatus(msg, warn=false){ if(els.dataSourcePill){ els.dataSourcePill.textContent = msg; els.dataSourcePill.classList.toggle('warn', !!warn); els.dataSourcePill.classList.toggle('good', !warn); }}
function clean(v){return (v??'').toString().trim();}
function isHiddenFilterValue(v){const c=clean(v); return !c || HIDDEN_FILTER_VALUES.has(c) || HIDDEN_FILTER_VALUES.has(c.toLowerCase()) || /^special$/i.test(c);}
function money(n){return Number.isFinite(n) ? n.toLocaleString(undefined,{style:'currency',currency:'USD'}) : '—';}

function parseCurrency(v){
  const n = parseFloat(clean(v).replace(/[$,]/g,''));
  return Number.isFinite(n) ? n : 0;
}
function parseCsv(text){
  const rows=[]; let row=[]; let cell=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i]; const next=text[i+1];
    if(inQuotes){
      if(ch==='"' && next==='"'){ cell+='"'; i++; }
      else if(ch==='"'){ inQuotes=false; }
      else { cell+=ch; }
    } else {
      if(ch==='"'){ inQuotes=true; }
      else if(ch===','){ row.push(cell); cell=''; }
      else if(ch==='\n'){
        row.push(cell); rows.push(row); row=[]; cell='';
      } else if(ch==='\r') {
        // ignore; \n handles row boundary
      } else { cell+=ch; }

  }
  row.push(cell); rows.push(row);
  return rows.filter(r => r.some(c => clean(c) !== ''));

function normHeader(h){return clean(h).toLowerCase().replace(/[^a-z0-9]/g,'');}
const FIELD_ALIASES = {
  item:['itemnumber','item','odl','odlitemnumber'], category:['category'], family:['family','familyname'], size:['size'], width:['width'], height:['height'], refSize:['refsize'], listPrice:['listprice'],
  bulkItem:['bulkitemnumbers','bulkitemnumber','bulkitem','bulkitemno','bulkitemnum'], bulkListPrice:['bulklistprices','bulklistprice'], bulkCaseSize:['bulkcasesizes','bulkcasesize'],
  model:['model'], frameType:['frametype'], frameColor:['framecolor'], glassThickness:['glassthickness'], glassType:['glasstype'], igThickness:['igthickness'], igColor:['igcolor'],
  type:['type'], brand:['originalbrand','brand'], productUrl:['producturl'], imageUrl:['imageurl'], imageMatch:['imagematch'], sizeSort:['sizesort'], frameSort:['framesort']
};
const NO_HEADER_SCHEMAS = [
  ['item','category','family','size','width','height','refSize','listPrice','bulkItem','bulkListPrice','bulkCaseSize','model','frameType','frameColor','glassThickness','glassType','igThickness','igColor','type','brand','productUrl','imageUrl','imageMatch','sizeSort','frameSort'],
  ['item','category','family','size','width','height','refSize','listPrice','doorShopPrice','storePrice','customerPrice','bulkItem','bulkListPrice','bulkCaseSize','model','frameType','frameColor','glassThickness','glassType','igThickness','igColor','type','brand','productUrl','imageUrl','imageMatch','sizeSort','frameSort'],
  ['modelSuffix','listPrice','bulkItem','size','width','height','refSize','category','family','productUrl','bulkCaseSize','frameType','frameColor','glassThickness','glassType','igThickness','igColor','imageUrl','sizeSort','bulkListPrice','frameSort','type','item','model']
];
function rowToObj(row, schema){
  const o={}; schema.forEach((f,i)=>{ if(f) o[f]=row[i] ?? ''; });
  return normalizeRow(o);
}
function normalizeRow(o){
  const modelBase = clean(o.model);
  const modelSuffix = clean(o.modelSuffix);
  const model = modelSuffix && modelBase && !modelBase.toLowerCase().includes(modelSuffix.toLowerCase()) ? `${modelBase} ${modelSuffix}` : modelBase;
  return {
    item: clean(o.item), category: clean(o.category), family: clean(o.family), size: clean(o.size),
    width: parseFloat(clean(o.width).replace(/,/g,'')) || '', height: parseFloat(clean(o.height).replace(/,/g,'')) || '', refSize: clean(o.refSize),
    listPrice: parseCurrency(o.listPrice), bulkItem: clean(o.bulkItem), bulkListPrice: clean(o.bulkListPrice), bulkCaseSize: clean(o.bulkCaseSize),
    model, frameType: clean(o.frameType), frameColor: clean(o.frameColor), glassThickness: clean(o.glassThickness), glassType: clean(o.glassType),
    igThickness: clean(o.igThickness), igColor: clean(o.igColor), type: clean(o.type), brand: clean(o.brand), productUrl: clean(o.productUrl), imageUrl: clean(o.imageUrl), imageMatch: clean(o.imageMatch),

function rowsFromHeader(parsed){

    const i = header.findIndex(h => aliases.includes(h));
    if(i>=0) index[field]=i;

  });

  const preserveModelFilters = !!opts.preserveModelFilters && modalWasOpen;
  const savedFrameFilter = preserveModelFilters ? currentModelFrameResourceFilter : '';
  const savedIgFilter = preserveModelFilters ? currentModelIgResourceFilter : '';
  const savedStainable = preserveModelFilters ? !!document.getElementById('modelStainableFilter')?.checked : false;
  currentModalItem = r.item; currentModalRow = r;
  document.getElementById('modalTitle').textContent = `${r.family || 'ODL Glass'} — ODL# ${r.item}`;
  document.getElementById('modalSub').textContent = [r.size, r.category, r.model].filter(Boolean).join(' | ');
  const productLink = r.productUrl ? `<a class="link" href="${safe(r.productUrl)}" target="_blank" rel="noopener">Open ODL Product Page</a>` : '';
  const img = r.imageUrl ? `<img src="${safe(r.imageUrl)}" alt="${safe(r.family)}" onerror="this.replaceWith(makePlaceholder())">` : `<div class="placeholder">Image<br>Coming Soon</div>`;
  const groupedView = !!els.groupByModel?.checked;
  const detailsTab = groupedView ? '' : `<button class="tab-btn" data-tab="details" onclick="setActiveTab('details')" type="button">Details</button>`;
  const detailsPanel = groupedView ? '' : `<div class="tab-panel" data-panel="details"><div class="detail-grid">${detail('ODL Item Number', r.item)}${detail('List Price', money(Number(r.listPrice)), 'internal-only')}${detail('Family', r.family)}${detail('Category', r.category)}${detail('Size', r.size)}${detail('RefSize', r.refSize)}${detail('Width', r.width)}${detail('Height', r.height)}${detail('Frame Type', r.frameType)}${detail('Frame Color', r.frameColor)}${detail('Glass Thickness', r.glassThickness)}${detail('Glass Type', r.glassType)}${detail('IG Thickness', r.igThickness)}${detail('IG Color', r.igColor)}${detail('Model', r.model)}${detail('Type', r.type)}${detail('Original Brand', r.brand)}${detail('Bulk Item #', r.bulkItem, 'internal-only')}${detail('Bulk List Price', r.bulkListPrice, 'internal-only')}${detail('Bulk Case Size', r.bulkCaseSize, 'internal-only')}${detail('Image Match', r.imageMatch, 'internal-only')}</div><p style="margin-top:14px">${productLink}</p></div>`;
  document.getElementById('modalContent').innerHTML = `<div class="modal-img">${img}</div><div><div class="modal-prices">${priceHtml(r)}</div><div class="tabs"><button class="tab-btn active" data-tab="model" onclick="setActiveTab('model')" type="button">Model</button>${detailsTab}</div><div class="tab-panel active" data-panel="model">${modelItemsHtml(r)}</div>${detailsPanel}</div>`;
  if(preserveModelFilters){
    currentModelFrameResourceFilter = savedFrameFilter;
    currentModelIgResourceFilter = savedIgFilter;
    const stainableInput = document.getElementById('modelStainableFilter');
    if(stainableInput) stainableInput.checked = savedStainable;
    document.querySelectorAll('.resource-filter-btn').forEach(btn=>{
      const active = btn.dataset.resourceKind === 'frame' ? btn.dataset.resourceIndex === currentModelFrameResourceFilter : btn.dataset.resourceIndex === currentModelIgResourceFilter;
      btn.classList.toggle('active', active);
    });
    refreshModelTable();
  }
  document.getElementById('modalBackdrop').style.display='flex';
}
function closeModal(){document.getElementById('modalBackdrop').style.display='none';}
function setMode(mode){currentMode=mode; document.body.classList.remove('mode-door','mode-store','mode-customer'); document.body.classList.add(`mode-${mode}`); document.querySelectorAll('.mode button').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode)); render(); if(currentModalItem){const r=DATA.find(x=>x.item===currentModalItem); if(document.getElementById('modalBackdrop').style.display==='flex') openModal(currentModalRow || r);}}
function setFiltersVisible(show){document.body.classList.toggle('filters-hidden', !show); els.showFilters.textContent = show ? 'Hide Filters' : 'Show Filters';}
function resetFilters(){els.q.value=''; FILTER_FIELDS.forEach(cfg => els[cfg.id].value=''); currentPage=1; applyFilters();}
function exportCsv(){const cols=['item','family','category','size','refSize','listPrice','frameType','frameColor','glassThickness','glassType','igThickness','igColor','model','bulkItem','bulkListPrice','bulkCaseSize','productUrl','imageUrl','sizeSort','frameSort']; const lines=[cols.join(',')]; filtered.forEach(r=>lines.push(cols.map(c=>`"${clean(r[c]).replace(/"/g,'""')}"`).join(','))); const blob=new Blob([lines.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='odl-glass-filtered.csv'; a.click(); URL.revokeObjectURL(a.href);}
document.querySelectorAll('.mode button').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
['q','size','category','family','model','frameType','frameColor','glassType'].forEach(id=>els[id].addEventListener('input',applyFilters));
['doorMult','storeMargin','customerMargin'].forEach(id=>els[id].addEventListener('input',()=>{render(); if(currentModalItem && document.getElementById('modalBackdrop').style.display==='flex'){const r=DATA.find(x=>x.item===currentModalItem); if(r) openModal(r);}}));
els.sortBy.addEventListener('change',()=>{currentPage=1;sortFilteredRows();render();}); if(els.groupByModel) els.groupByModel.addEventListener('change',()=>{currentPage=1;syncGroupByModelUi();applyFilters();}); els.pageSize.addEventListener('change',()=>{currentPage=1;render();}); els.prevPage.addEventListener('click',()=>{currentPage=Math.max(1,currentPage-1);render();window.scrollTo({top:0,behavior:'smooth'});}); els.nextPage.addEventListener('click',()=>{currentPage=currentPage+1;render();window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('resetPricing').addEventListener('click',()=>{els.doorMult.value='0.504';els.storeMargin.value='30';els.customerMargin.value='25';render();});
els.resetFilters.addEventListener('click',resetFilters); els.refreshData.addEventListener('click',loadLiveData); els.collapseFilters.addEventListener('click',()=>setFiltersVisible(false)); els.hideFilters.addEventListener('click',()=>setFiltersVisible(false)); els.showFilters.addEventListener('click',()=>setFiltersVisible(document.body.classList.contains('filters-hidden')));
document.getElementById('exportCsv').addEventListener('click',exportCsv); document.getElementById('modalClose').addEventListener('click',closeModal); document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop') closeModal();}); document.addEventListener('keydown',e=>{if(e.key==='Escape') closeModal();});
loadLiveData();
</script>
</body>
</html>
